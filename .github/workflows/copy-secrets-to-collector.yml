name: copy-secrets-to-collector

# 一次性(#9 三併一 Phase 1 收尾):把本 repo 的 5 個 secrets 以 TBVOC_ 前綴
# 複製到 short-video-bot,供其 collect.yml 的 tbvoc matrix job 使用。
#
# 為什麼用 workflow 搬而不是人工貼:
# - GitHub secrets 設定後讀不回來,原值只在這裡的 Actions runtime 拿得到;
# - 機器搬運 = 逐字複製,從源頭消除「貼錯格/貼錯值」風險;
# - 值全程走 env → gh secret set(stdin),不落 log(Actions 遮罩 + gh 不 echo)。
#
# 前置:repo secret `CROSS_REPO_PAT`(對 short-video-bot 有 admin 權的 token,用完即刪)。
# 跑成功後最後一步「自拆」:先刪 CROSS_REPO_PAT secret、再把本檔從 main 移除,
# 不留常駐搬運通道,也不需要第二輪人工清理。
on:
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  copy:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Copy 5 secrets to short-video-bot with TBVOC_ prefix
        env:
          GH_TOKEN: ${{ secrets.CROSS_REPO_PAT }}
          V_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          V_SA: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          V_SHEET: ${{ secrets.GOOGLE_SHEET_ID }}
          V_ALLOWED: ${{ secrets.ALLOWED_CHAT_IDS }}
          V_ERROR: ${{ secrets.ERROR_CHAT_ID }}
        run: |
          set -euo pipefail
          R=pei760730/short-video-bot
          for pair in "TBVOC_TELEGRAM_BOT_TOKEN:V_TOKEN" \
                      "TBVOC_GOOGLE_SERVICE_ACCOUNT_JSON:V_SA" \
                      "TBVOC_GOOGLE_SHEET_ID:V_SHEET" \
                      "TBVOC_ALLOWED_CHAT_IDS:V_ALLOWED" \
                      "TBVOC_ERROR_CHAT_ID:V_ERROR"; do
            name="${pair%%:*}"; src="${pair##*:}"
            if [ -z "${!src}" ]; then
              echo "::error::來源 secret 為空:$src(對應 $name),中止 —— 別把空值蓋到目標。"
              exit 1
            fi
            printf '%s' "${!src}" | gh secret set "$name" -R "$R"
            echo "✓ $name 已設"
          done
          echo "=== 反向驗證:目標 repo 現有 TBVOC_* secrets(只列名,不碰值)==="
          gh api "repos/$R/actions/secrets" --jq '.secrets[].name' | grep '^TBVOC_'

      - name: Self-cleanup — 刪 CROSS_REPO_PAT、再把本檔自 main 移除
        if: success()
        env:
          GH_TOKEN: ${{ secrets.CROSS_REPO_PAT }}
        run: |
          set -euo pipefail
          SELF=pei760730/clip-collector
          FILE=.github/workflows/copy-secrets-to-collector.yml
          # 先拆彈:secret 一刪,本檔即使殘留也是死的(GH_TOKEN 注入後仍在 env,後續 API 照常可用)
          gh secret delete CROSS_REPO_PAT -R "$SELF"
          echo "✓ CROSS_REPO_PAT 已刪"
          SHA=$(gh api "repos/$SELF/contents/$FILE?ref=main" --jq .sha)
          gh api -X DELETE "repos/$SELF/contents/$FILE" \
            -f message="chore(#9): 一次性 copy-secrets workflow 用畢自拆(CROSS_REPO_PAT 已先行刪除)" \
            -f sha="$SHA" -f branch=main >/dev/null
          echo "✓ 本 workflow 檔已自 main 移除"
