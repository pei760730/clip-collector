name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      # 守門:宣稱版本 == 實裝版本(lockfile 落後 package.json spec 時必紅,防 PR #29 類靜默漂移)
      - run: node scripts/check-dep-pin.mjs
      - run: npm run typecheck
      - run: npm test
      - run: npm run build
