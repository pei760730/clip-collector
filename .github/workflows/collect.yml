name: collect

# 定時把 Telegram 這段時間囤的訊息撈乾、解析、寫進「參考池」,然後結束。
# 取代常駐機器:repo 是 public → Actions 免費額度無上限,$0。
# Telegram 保留未領更新約 24h,只要間隔 < 24h 就不漏訊息。
on:
  schedule:
    - cron: "*/5 * * * *" # 每 5 分鐘;收訊息延遲約 5–15 分(GitHub 排程會拖,非秒到)
  workflow_dispatch: {} # 手動補跑

# 同時只跑一個,避免兩個 job 並行領 getUpdates 互搶(會漏 ack)。
concurrency:
  group: collect
  cancel-in-progress: false

jobs:
  drain:
    runs-on: ubuntu-latest
    timeout-minutes: 10 # 保險:任何意外卡死 10 分鐘殺掉,別吃滿額度、堵住後續 cron
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: drain
        # 留存輸出供失敗通知擷取真因(default shell 已含 -o pipefail,npm 退出碼會正確傳遞)。
        run: npm run drain 2>&1 | tee drain.log
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
          STORAGE: sheets
          # 來源白名單:只收這些 chat/user id 的訊息(公開後防陌生人灌池)。
          # 必設 —— 沒設 sheets 模式會 fail-fast 直接紅燈(寧可不跑,也不要大開)。
          ALLOWED_CHAT_IDS: ${{ secrets.ALLOWED_CHAT_IDS }}
          # cron 無人等候,展開 TikTok 等短連結→正規連結,讓短/長連結去重一致。
          # 展開失敗會優雅退回原值(不會更糟)。
          EXPAND_SHORT_URLS: "true"
          # 寫表失敗時的 Telegram 告警對象(從 secrets 注入,別硬編任何人的 chat id)。
          # 沒設的話 notifyError 會 no-op,cron 默默壞掉收不到通知。
          ERROR_CHAT_ID: ${{ secrets.ERROR_CHAT_ID }}

      # drain 層崩潰(如 ensureHeader 對 live 表頭斷言失敗 = 跨 repo 契約漂移)會 process.exit(1),
      # 但那發生在逐筆 notifyError 之前 → 不會走 in-app 告警。這一步補:job 失敗就 Telegram 喊一聲,
      # 否則只剩 GitHub 紅燈(owner chat-only 看不到)。契約漂移 ≤5min(cron)內就被這條叫出來。
      - name: Notify Telegram on failure
        if: failure()
        continue-on-error: true
        env:
          TG_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TG_CHAT: ${{ secrets.ERROR_CHAT_ID }}
        run: |
          if [ -z "$TG_TOKEN" ] || [ -z "$TG_CHAT" ]; then echo "no TELEGRAM_BOT_TOKEN / ERROR_CHAT_ID → skip"; exit 0; fi
          # 貼真實錯誤尾巴,別再寫死猜測原因(chat-only owner 不開 log)。抓不到就退中性訊息。
          ERR=$(grep -iE 'ERROR|Error:|錯誤|失敗' drain.log 2>/dev/null | tail -n 2 | cut -c1-280)
          [ -z "$ERR" ] && ERR="(未擷取到錯誤,請看下方 log)"
          MSG="🔴 clip-collector collect 失敗：${ERR} — ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          curl -sS --max-time 20 "https://api.telegram.org/bot${TG_TOKEN}/sendMessage" --data-urlencode "chat_id=${TG_CHAT}" --data-urlencode "text=${MSG}" >/dev/null && echo "telegram notified" || echo "telegram notify failed (ignored)"
